<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CVPR Papers with Code — 2019–2025</title>
<meta name="description" content="Index of CVPR papers with code, 2019–2025, searchable by category and year.">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>CVPR Papers<span>with Code</span></h1>
      <p class="sub">2019 – 2025 index</p>
    </div>

    <div class="years" id="years"></div>

    <input id="search" class="search" type="search" placeholder="Search categories or titles…" autocomplete="off">

    <nav id="catlist" class="catlist"></nav>
  </aside>

  <main class="content">
    <header class="content-header">
      <div>
        <h2 id="viewTitle">All categories</h2>
        <p id="viewMeta" class="meta"></p>
      </div>
    </header>
    <div id="results" class="results"></div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
